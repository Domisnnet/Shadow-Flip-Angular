<main class="slider">
  <button class="btn-seta btn-voltar" id="btn-voltar">
    <img src="../assets/images/seta.png" alt="seta voltar" />
  </button>

  <ul class="lista-personagens">
    <app-personagem-card
      *ngFor="let personagem of personagens; let i = index"
      [personagem]="personagem"
      [selecionado]="i === 0"
    ></app-personagem-card>
  </ul>

  <button class="btn-seta btn-avancar" id="btn-avancar">
    <img src="../assets/images/seta.png" alt="seta avançar" />
  </button>
</main>
