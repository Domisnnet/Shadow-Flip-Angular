<main class="slider">
  <button class="btn-seta btn-voltar" (click)="previous()">
    ←
  </button>

  <ul class="lista-personagens">
    @for (card of cards; track card; let i = $index) {
      <app-card-item
        [card]="card"
        [cardIndex]="i">
      </app-card-item>
    }
  </ul>

  <button class="btn-seta btn-avancar" (click)="next()">
    →
  </button>
</main>
