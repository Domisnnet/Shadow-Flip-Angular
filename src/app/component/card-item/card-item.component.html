<!-- A raiz foi trocada para <div> para garantir o alinhamento correto com flexbox -->
<div class="cartao selecionado">
  <div class="container-imagem">
    <!-- Usando o input 'card' para popular a imagem e o nome -->
    <img [src]="card().image" [alt]="card().name">
  </div>

  <div class="descricao">
    <h2 class="nome">{{ card().name }}</h2>
  </div>
</div>
